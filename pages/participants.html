.nav-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.nav-pill{border:1px solid #ddd5c9;background:#fff;border-radius:999px;padding:13px 22px;font-weight:900;box-shadow:0 8px 18px rgba(21,16,68,.04);font-size:.92rem}.nav-pill:hover{border-color:var(--violet)}.nav-pill.primary{background:var(--violet);color:#fff;border-color:var(--violet)}.nav-pill.primary:hover{background:#5a3ad4}.app-pill{border-color:var(--teal);color:var(--ink)}.app-pill:hover{background:var(--teal);color:#fff}

.hero{background:radial-gradient(circle at 82% 10%,rgba(242,79,180,.22),transparent 34%),linear-gradient(120deg,rgba(24,61,112,.72),rgba(37,16,82,.68) 45%,rgba(59,18,76,.65)),url('../assets/images/hero-participants.jpg') center/cover;color:#fff;padding:58px 28px 50px}.hero-inner{max-width:1440px;margin:auto;display:grid;grid-template-columns:1.4fr 1fr;gap:40px;align-items:center}.eyebrow{display:inline-flex;border:1px solid rgba(241,191,50,.6);background:rgba(241,191,50,.13);color:#ffe18a;border-radius:999px;padding:9px 18px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.6rem,7vw,7rem);line-height:.88;margin:35px 0 22px;letter-spacing:-.055em}.hero p{font-size:clamp(1.05rem,2vw,1.35rem);line-height:1.65;color:rgba(255,255,255,.78);max-width:780px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.stat-card{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);border-radius:22px;padding:24px}.stat-card b{display:block;font-size:2.5rem;color:var(--gold);line-height:1}.stat-card span{font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.72)}
.wrap{max-width:1440px;margin:auto;padding:36px 28px 80px}.control-panel{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:-64px;position:relative;z-index:5}.control-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)}.control-card .label{font-size:.75rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}.control-card .value{font-size:1.5rem;font-weight:900;margin-top:8px}.status-dot{width:10px;height:10px;background:#aaa;border-radius:50%;display:inline-block;margin-right:8px}.status-waiting{color:#777}.section{background:#fffdf9;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);margin:28px 0;overflow:hidden}.section summary{list-style:none;cursor:pointer;padding:26px 30px;display:flex;align-items:center;justify-content:space-between;gap:18px;background:radial-gradient(circle at 85% 16%,rgba(255,79,203,.22),transparent 24%),linear-gradient(135deg,#100824 0%,#1c0f45 36%,#2f1568 72%,#4f2287 100%);color:#fff;border-bottom:1px solid rgba(255,255,255,.08);box-shadow:inset 0 -1px 0 rgba(255,255,255,.08)}.section summary:hover{filter:brightness(1.02)}.section summary::-webkit-details-marker{display:none}.summary-left{display:flex;align-items:center;gap:16px}.section-icon{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;font-size:1.5rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 24px rgba(0,0,0,.12)}.section h2{margin:0;font-size:1.45rem;color:#fff}.section-sub{margin:4px 0 0;color:rgba(245,241,255,.82);font-weight:600}.chev{font-weight:900;font-size:1.3rem;transition:.25s;color:#fff}.section[open] .chev{transform:rotate(180deg)}.section-body{padding:28px 30px 34px;background:#fffdf9}.info-note{background:#fff4da;border:1px solid #f4d98f;border-radius:18px;padding:18px 20px;margin-bottom:24px;color:#5c4520;font-weight:700}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}.tab-btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:11px 16px;font-weight:900;color:var(--ink);cursor:pointer}.tab-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}.tab-panel{display:none}.tab-panel.active{display:block}.phase-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.phase-info{border:1px solid var(--line);background:#fff;border-radius:24px;overflow:hidden}.phase-head{padding:20px 24px;color:#fff;display:flex;justify-content:space-between;align-items:flex-end}.phase-title{font-size:1.6rem;font-weight:900}.phase-time{font-weight:900;opacity:.72}.phase-count{font-size:2rem;font-weight:900}.phase-body{padding:18px 20px}.template-list{display:grid;gap:10px}.template-row{display:grid;grid-template-columns:44px 64px 1fr auto;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}.checkbox{width:24px;height:24px;border:2px solid #d8cec0;border-radius:8px}.code{font-weight:900;color:#e9367d}.t-name{font-weight:900}.t-desc{display:block;color:var(--muted);font-size:.86rem;margin-top:2px}.badge-status,.pill{border-radius:999px;padding:8px 12px;font-size:.78rem;font-weight:900;text-transform:uppercase;white-space:nowrap}.not-started{background:#f2eee6;color:#777}.locked{background:#f2eee6;color:#777}.waiting{background:#f2eee6;color:#777}.activity-box{margin-top:16px;background:#f7f3ed;border:1px dashed #d8cbb9;border-radius:18px;padding:16px;font-weight:800}.activity-box span{color:#9b6b00}.table-scroll{overflow:auto;border:1px solid var(--line);border-radius:22px;background:#fff}.progress-table{width:100%;border-collapse:collapse;min-width:1040px}.progress-table th,.progress-table td{padding:15px 14px;text-align:center;border-bottom:1px solid var(--line);font-weight:800}.progress-table th{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:#5e5870;background:#fbf7f0}.progress-table td:first-child,.progress-table th:first-child{text-align:left;position:sticky;left:0;background:#fff;z-index:2}.progress-table th:first-child{background:#fbf7f0}.tiny-bar{height:8px;border-radius:999px;background:#eee7dd;overflow:hidden;margin-top:8px}.tiny-fill{height:100%;width:0;background:var(--teal)}.team-status{display:inline-grid;place-items:center;width:34px;height:34px;border-radius:50%;border:2px solid #e0d8cc;background:#f6f1e9;color:#777;font-weight:900}.team-status.locked{background:#f6f1e9}.team-status.complete{background:var(--green);border-color:var(--green);color:#13310c}.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}.badge-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;border-top:7px solid var(--blue)}.badge-card:nth-child(2){border-top-color:var(--teal)}.badge-card:nth-child(3){border-top-color:var(--violet)}.badge-card:nth-child(4){border-top-color:var(--pink)}.badge-card:nth-child(5){border-top-color:var(--gold)}.badge-card:nth-child(6){border-top-color:var(--green)}.badge-card:nth-child(7){border-top-color:var(--blue)}.badge-card:nth-child(8){border-top-color:#c8952c}.badge-icon{width:68px;height:68px;border-radius:20px;display:grid;place-items:center;font-size:2rem;background:linear-gradient(135deg,rgba(71,114,255,.24),rgba(242,79,180,.18));margin-bottom:14px}.badge-card h3{margin:0 0 8px;font-size:1.25rem}.badge-card p{margin:0 0 18px;color:var(--muted);font-weight:600;line-height:1.45}.badge-team-table{min-width:1120px}.reflection-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}.reflection-card{border:1px solid var(--line);background:#fff;border-radius:22px;padding:20px}.reflection-card h3{margin:0 0 10px}.reflection-card p{color:var(--muted);line-height:1.55;margin:0 0 14px;font-weight:600}.mark-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.mark-card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:22px}.mark-card b{display:block;font-size:2.2rem;color:var(--gold);margin-bottom:6px}.mark-card h3{margin:0 0 8px}.mark-card p{margin:0;color:var(--muted);font-weight:600;line-height:1.45}.footer-note{text-align:center;color:var(--muted);font-weight:700;margin-top:34px}.phase-empathy{background:var(--teal)}.phase-define{background:var(--violet)}.phase-ideate{background:var(--pink)}.phase-prototype{background:var(--gold);color:var(--ink)}.phase-test{background:var(--green);color:var(--ink)}.phase-pitch{background:var(--blue)}


.tiktok-brief{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(37,16,82,.96),rgba(107,77,255,.9) 48%,rgba(255,79,203,.78));border-radius:28px;padding:28px;margin-bottom:24px;color:#fff;box-shadow:0 24px 58px rgba(37,16,82,.18);border:1px solid rgba(255,255,255,.18)}

.challenge-intro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:28px 0}
.challenge-intro-card{position:relative;overflow:hidden;background:#fff;border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow);min-height:220px}
.challenge-intro-card::after{content:"";position:absolute;right:-58px;top:-58px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(255,200,61,.28),transparent 70%)}
.challenge-intro-card:nth-child(2)::after{background:radial-gradient(circle,rgba(255,79,203,.24),transparent 70%)}
.challenge-intro-card:nth-child(3)::after{background:radial-gradient(circle,rgba(33,212,194,.26),transparent 70%)}
.challenge-intro-icon{width:58px;height:58px;border-radius:20px;display:grid;place-items:center;font-size:1.7rem;margin-bottom:16px;background:linear-gradient(135deg,rgba(109,70,238,.16),rgba(242,79,180,.16))}
.challenge-intro-card h3{margin:0 0 9px;font-size:1.25rem}.challenge-intro-card p{margin:0 0 16px;color:var(--muted);font-weight:650;line-height:1.5}.challenge-intro-tag{display:inline-flex;align-items:center;border-radius:999px;padding:8px 12px;font-size:.76rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;background:#f4efe7;color:#5c4520}.challenge-intro-card:nth-child(1){border-top:7px solid var(--violet)}.challenge-intro-card:nth-child(2){border-top:7px solid var(--pink)}.challenge-intro-card:nth-child(3){border-top:7px solid var(--teal)}
@media(max-width:980px){.challenge-intro-grid{grid-template-columns:1fr}}

.final-pitch-alert{position:relative;overflow:hidden;margin:0 0 24px;background:linear-gradient(135deg,#fffdf9 0%,#fff4da 45%,rgba(33,212,194,.12) 100%);border:1px solid #f4d98f;border-radius:28px;padding:26px;box-shadow:0 18px 42px rgba(21,16,68,.07)}

.pitch-alert-head{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:20px}.pitch-kicker{display:inline-flex;align-items:center;gap:8px;background:var(--indigo);color:#fff;border-radius:999px;padding:8px 14px;font-size:.75rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em}.final-pitch-alert h3{font-size:1.8rem;line-height:1.15;margin:12px 0 10px;color:var(--ink)}.final-pitch-alert p{margin:0;color:#5c4520;font-weight:700;line-height:1.6;max-width:900px}.pitch-badge{min-width:140px;text-align:center;background:var(--violet);color:#fff;border-radius:22px;padding:14px 16px;box-shadow:0 14px 30px rgba(37,16,82,.16);font-weight:900}.pitch-badge b{display:block;font-size:2rem;line-height:1;color:var(--gold)}.pitch-badge span{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.82)}
.pitch-info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.pitch-info-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 10px 22px rgba(21,16,68,.04)}.pitch-info-card .mini-label{font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:7px}.pitch-info-card strong{display:block;font-size:1rem;line-height:1.35;color:var(--ink)}
.pitch-slide-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.pitch-slide-chip{background:#fff;border:1px solid var(--line);border-left:5px solid var(--pink);border-radius:16px;padding:12px;font-weight:850;color:#4d465f;line-height:1.35}.pitch-slide-chip b{display:block;color:var(--pink);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}.pitch-reminder{margin-top:16px;background:#251052;color:#fff;border-radius:20px;padding:16px 18px;font-weight:800;line-height:1.55}.pitch-reminder span{color:var(--gold)}
.marks-alert{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;margin-bottom:22px}.marks-total-panel{background:linear-gradient(135deg,var(--indigo),var(--violet));color:#fff;border-radius:26px;padding:24px;box-shadow:0 18px 42px rgba(37,16,82,.16)}.marks-total-panel .kicker{display:inline-flex;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:8px 13px;font-weight:900;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase}.marks-total-panel h3{margin:12px 0 8px;font-size:1.7rem}.marks-total-panel p{margin:0;color:rgba(255,255,255,.78);font-weight:650;line-height:1.55}.marks-breakdown{display:grid;gap:12px}.marks-chip{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;display:grid;grid-template-columns:74px 1fr;gap:14px;align-items:center}.marks-chip b{font-size:1.8rem;color:var(--violet);line-height:1}.marks-chip:nth-child(2) b{color:var(--pink)}.marks-chip h4{margin:0 0 4px}.marks-chip p{margin:0;color:var(--muted);font-weight:650;line-height:1.4}.mark-card ul{margin:12px 0 0;padding-left:18px;color:var(--muted);font-weight:650;line-height:1.55}.mark-card li{margin-bottom:5px}

@media(max-width:700px){.pitch-alert-head{display:block}.pitch-badge{margin-top:16px}.pitch-info-grid,.pitch-slide-grid{grid-template-columns:1fr}.marks-chip{grid-template-columns:1fr}.final-pitch-alert{padding:20px}}


.quick-jump{display:flex;gap:12px;flex-wrap:wrap;margin:22px 0 30px;position:relative;z-index:4}

.quick-jump a:hover{border-color:var(--violet);color:var(--violet);transform:translateY(-1px)}
.checklist-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}

.student-action-journey{margin:28px 0 30px}
